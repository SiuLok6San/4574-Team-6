version: 2

sources:
  - name: google_drive
    database: LOAD
    schema: GOOGLE_DRIVE
    config:
      freshness:
        warn_after: {count: 7, period: day}
        error_after: {count: 14, period: day}
      loaded_at_field: "_fivetran_synced"
    tables:
      - name: EXPENSES
      - name: RETURNS
      - name: HR_JOINS
      - name: HR_QUITS

  - name: web_schema
    database: LOAD
    schema: WEB_SCHEMA
    config:
      freshness:
        warn_after: {count: 7, period: day}
        error_after: {count: 14, period: day}
      loaded_at_field: '"_fivetran_synced"'
    tables:
      - name: ITEM_VIEWS
      - name: ORDERS
      - name: PAGE_VIEWS
      - name: SESSIONS