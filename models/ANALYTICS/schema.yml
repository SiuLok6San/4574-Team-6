version: 2

models:
  - name: dim_employee
    description: One row per employee, including both active employees and employees who have already quit.
    columns:
      - name: employee_id
        description: Unique identifier for each employee.
        tests:
          - unique
          - not_null
      - name: employee_name
        description: Full name of the employee.
      - name: city
        description: City where the employee is based.
      - name: address
        description: Address associated with the employee record.
      - name: title
        description: Job title of the employee.
      - name: annual_salary
        description: Annual salary recorded for the employee.
      - name: hire_date
        description: Date when the employee joined the company.
      - name: quit_date
        description: Date when the employee quit, if applicable.
      - name: employment_status
        description: Employment status derived from join and quit information, such as active or quit.

  - name: dim_client
    description: One row per client based on the latest available session-level information.
    columns:
      - name: client_id
        description: Unique identifier for each client.
        tests:
          - unique
          - not_null
      - name: latest_session_at
        description: Timestamp of the most recent observed session for the client.
      - name: latest_os
        description: Latest observed operating system used by the client.
      - name: latest_ip
        description: Latest observed IP address for the client.

  - name: dim_item
    description: One row per item, summarizing price variation and item-level engagement metrics.
    columns:
      - name: item_name
        description: Name of the item.
        tests:
          - unique
          - not_null
      - name: min_price_per_unit
        description: Minimum observed unit price for the item across item view records.
      - name: max_price_per_unit
        description: Maximum observed unit price for the item across item view records.
      - name: price_variant_count
        description: Number of distinct observed prices for the item.
      - name: item_view_count
        description: Total number of item-view events recorded for the item.
      - name: unique_session_count
        description: Number of distinct sessions in which the item was viewed.
      - name: total_add_to_cart_qty
        description: Total quantity of the item added to cart across all sessions.
      - name: total_remove_from_cart_qty
        description: Total quantity of the item removed from cart across all sessions.

  - name: fact_session
    description: One row per session, summarizing website behavior, funnel steps, cart activity, and ordering activity.
    columns:
      - name: client_id
        description: Identifier of the client associated with the session.
      - name: session_id
        description: Unique identifier for the session.
        tests:
          - unique
          - not_null
      - name: session_at
        description: Timestamp when the session occurred.
      - name: os
        description: Operating system used during the session.
      - name: ip
        description: IP address recorded for the session.
      - name: viewed_landing_page
        description: Indicator showing whether the landing page was viewed during the session.
      - name: viewed_shop_plants
        description: Indicator showing whether the shop plants page was viewed during the session.
      - name: viewed_cart
        description: Indicator showing whether the cart page was viewed during the session.
      - name: viewed_item
        description: Indicator showing whether at least one item was viewed during the session.
      - name: item_view_count
        description: Number of item-view events recorded in the session.
      - name: total_add_to_cart_qty
        description: Total quantity of items added to cart during the session.
      - name: total_remove_from_cart_qty
        description: Total quantity of items removed from cart during the session.
      - name: placed_order
        description: Indicator showing whether the session resulted in at least one order.
      - name: num_orders
        description: Number of orders placed in the session.
      - name: first_page_view_at
        description: Timestamp of the first page-view event recorded in the session.

  - name: fact_order
  description: One row per order summarizing order details, revenue, shipping, tax, and return information.
  columns:
    - name: order_id
      description: Unique order identifier.
      tests:
        - unique
        - not_null

    - name: session_id
      description: Session associated with the order.

    - name: item_revenue
      description: Estimated item-level revenue based on price_per_unit multiplied by add_to_cart_quantity within the order session.

    - name: order_revenue
      description: Estimated order revenue before tax, equal to item_revenue plus shipping_cost.

    - name: total_revenue
      description: Estimated total revenue including tax, equal to (item_revenue plus shipping_cost) times (1 plus tax_rate).

    - name: shipping_cost
      description: Shipping amount charged for the order.

    - name: tax_rate
      description: Tax rate applied to the order.

    - name: refunded_flag
      description: Indicates whether the order was refunded.

    - name: return_record_count
      description: Number of return records associated with the order.

  - name: daily_finances
  description: Daily summary of expenses, orders, revenue, and returns.
  columns:
    - name: date_day
      description: Calendar day for the daily summary.

    - name: total_expenses
      description: Total expenses recorded on that day.

    - name: total_orders
      description: Total number of orders placed on that day.

    - name: shipping_revenue
      description: Total shipping charges collected from orders placed on that day.

    - name: total_item_revenue
      description: Total estimated item revenue from orders placed on that day.

    - name: total_order_revenue
      description: Total estimated order revenue before tax, equal to item revenue plus shipping revenue.

    - name: total_revenue
      description: Total estimated revenue including tax from orders placed on that day.

    - name: total_returns
      description: Total number of return records on that day.

    - name: total_refunded_orders
      description: Total number of refunded returned orders on that day.

  - name: fact_return
    description: One row per returned order, summarizing the return date and refund information.
    columns:
      - name: order_id
        description: Identifier of the order that was returned.
        tests:
          - not_null
      - name: returned_at
        description: Date of the first recorded return for the order.
      - name: refunded_flag
        description: Indicator showing whether the return was refunded.
      - name: return_record_count
        description: Number of return records associated with the returned order.

  - name: funnel_summary
    description: Aggregate funnel summary across all sessions, counting how many sessions reached each stage.
    columns:
      - name: total_sessions
        description: Total number of sessions included in the funnel.

  - name: daily_web_funnel
    description: Daily website funnel metrics including sessions, engagement, orders, returns, and conversion rates.
    columns:
      - name: date_day
        description: Calendar date for the aggregated website funnel metrics.
        tests:
          - not_null
          - unique
      - name: sessions_count
        description: Total number of sessions on that day.
      - name: page_views_count
        description: Total number of page views on that day.
      - name: item_views_count
        description: Total number of item views on that day.
      - name: total_orders
        description: Total number of orders placed on that day.
      - name: returns_count
        description: Total number of returned orders on that day.
      - name: session_to_order_rate
        description: Ratio of total orders to total sessions for that day.
      - name: return_rate
        description: Ratio of returned orders to total orders for that day.

  - name: state_order_summary
  description: Summary of order activity and revenue by state.
  columns:
    - name: state
      description: State associated with the shipping address of the order.

    - name: total_orders
      description: Total number of orders shipped to the state.

    - name: total_sessions_with_orders
      description: Total number of distinct sessions that resulted in orders for the state.

    - name: avg_shipping_cost
      description: Average shipping cost charged on orders for the state.

    - name: avg_tax_rate
      description: Average tax rate applied to orders for the state.

    - name: total_item_revenue
      description: Total estimated item revenue for orders in the state.

    - name: total_order_revenue
      description: Total estimated order revenue before tax for the state.

    - name: total_revenue
      description: Total estimated revenue including tax for the state.

    - name: avg_order_revenue
      description: Average estimated order revenue before tax for the state.

    - name: avg_total_revenue
      description: Average estimated total revenue including tax for the state.
      
  - name: return_rate_by_state
    description: Summary of order return rates by shipping state.
    columns:
      - name: state
        description: Shipping state associated with the order.
        tests:
          - not_null
      - name: total_orders
        description: Total number of orders in the state.
      - name: returned_orders
        description: Total number of returned orders in the state.
      - name: return_rate
        description: Ratio of returned orders to total orders in the state.

  - name: employee_city_summary
    description: Summary of employee distribution and employment status by city.
    columns:
      - name: city
        description: City associated with the employee.
        tests:
          - not_null
          - unique
      - name: total_employees
        description: Total number of employees in the city.
      - name: active_employees
        description: Number of active employees in the city.
      - name: quit_employees
        description: Number of employees who have quit in the city.