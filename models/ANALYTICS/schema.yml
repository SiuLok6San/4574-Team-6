version: 2

models:
  - name: dim_employee
    description: One row per employee with employment status.
    columns:
      - name: employee_id
        description: Unique employee identifier.
        tests:
          - unique
          - not_null
      - name: employee_name
        description: Employee full name.
      - name: employment_status
        description: Indicates whether the employee is active or has quit.

  - name: dim_client
    description: One row per client observed in website sessions.
    columns:
      - name: client_id
        description: Unique client identifier.
        tests:
          - unique
          - not_null

  - name: dim_item
    description: One row per item observed in item views.
    columns:
      - name: item_name
        description: Item name.
        tests:
          - not_null
      - name: price_per_unit
        description: Price of one unit of the item.

  - name: fact_session
    description: One row per session summarizing website behavior and funnel steps.
    columns:
      - name: session_id
        description: Unique session identifier.
        tests:
          - unique
          - not_null
      - name: client_id
        description: Client associated with the session.
      - name: placed_order
        description: 1 if the session resulted in at least one order.

  - name: fact_order
    description: One row per order after deduplicating duplicate order IDs.
    columns:
      - name: order_id
        description: Unique order identifier.
        tests:
          - unique
          - not_null
      - name: session_id
        description: Session associated with the order.
        tests:
          - not_null
      - name: state
        description: Shipping state for the order.

  - name: daily_finances
    description: Daily summary of expenses, orders, shipping revenue, and returns.
    columns:
      - name: date_day
        description: Calendar date for the aggregated metrics.
        tests:
          - not_null

  - name: fact_return
    description: One row per returned order.
    columns:
      - name: order_id
        description: Order associated with the return.
        tests:
          - not_null
      - name: is_refunded_flag
        description: 1 if the returned order was refunded.

  - name: funnel_summary
    description: Aggregated funnel summary across all website sessions.
    columns:
      - name: total_sessions
        description: Total number of sessions included in the funnel.

  - name: daily_web_funnel
    description: Daily website funnel metrics including sessions, engagement, orders, returns, and conversion rates.
    columns:
      - name: date_day
        description: Calendar date for the aggregated website funnel metrics.
        tests:
          - not_null
          - unique
      - name: sessions_count
        description: Total number of sessions on that day.
      - name: page_views_count
        description: Total number of page views on that day.
      - name: item_views_count
        description: Total number of item views on that day.
      - name: total_orders
        description: Total number of orders placed on that day.
      - name: returns_count
        description: Total number of returned orders on that day.
      - name: session_to_order_rate
        description: Ratio of total orders to total sessions for that day.
      - name: return_rate
        description: Ratio of returned orders to total orders for that day.

  - name: state_order_summary
    description: Summary of order activity by shipping state.
    columns:
      - name: state
        description: Shipping state for the order.
        tests:
          - not_null
      - name: total_orders
        description: Total number of orders shipped to the state.
      - name: total_sessions_with_orders
        description: Number of unique sessions associated with orders in the state.
      - name: avg_shipping_cost
        description: Average shipping cost for orders in the state.
      - name: avg_tax_rate
        description: Average tax rate for orders in the state.

  - name: return_rate_by_state
    description: Summary of order return rates by shipping state.
    columns:
      - name: state
        description: Shipping state associated with the order.
        tests:
          - not_null
      - name: total_orders
        description: Total number of orders in the state.
      - name: returned_orders
        description: Total number of returned orders in the state.
      - name: return_rate
        description: Ratio of returned orders to total orders in the state.

  - name: employee_city_summary
    description: Summary of employee distribution and employment status by city.
    columns:
      - name: city
        description: City associated with the employee.
        tests:
          - not_null
          - unique
      - name: total_employees
        description: Total number of employees in the city.
      - name: active_employees
        description: Number of active employees in the city.
      - name: quit_employees
        description: Number of employees who have quit in the city.